<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
  <title id="title">Semantic-Native VAE Architecture</title>
  <desc id="desc">Thesis-style SVG showing a U-shaped semantic-native VAE. Trainable semantic stem on the left feeds a frozen 2D encoder core, producing a latent bottleneck. The latent is decoded by a frozen temporal decoder core on the right, features are taken before semantic prediction, and a trainable 3D semantic head outputs semantic logits.</desc>

  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #162433; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 15px; fill: #58697c; }
      .section { font-size: 18px; font-weight: 700; }
      .label { font-size: 15px; font-weight: 700; }
      .body { font-size: 13px; }
      .small { font-size: 12px; fill: #546679; }
      .caption { font-size: 14px; fill: #314354; }
      .box { fill: #ffffff; stroke-width: 2.2; rx: 14; ry: 14; }
      .trainable { fill: #e3f0ff; stroke: #2d6aa3; }
      .frozen { fill: #eef1f4; stroke: #6d7782; }
      .latent { fill: #ffedd7; stroke: #b97312; }
      .op { fill: #ffffff; stroke: #9fb1c2; }
      .legend { fill: #fbfcfe; stroke: #c9d2db; }
      .arrow { stroke: #243748; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #5c6c7c; stroke-width: 2.0; fill: none; marker-end: url(#arrowThin); }
      .guide { stroke: #d7dde4; stroke-width: 1.4; }
    </style>

    <marker id="arrow" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#243748"/>
    </marker>
    <marker id="arrowThin" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5c6c7c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1180" fill="#ffffff"/>

  <text x="900" y="54" text-anchor="middle" class="title">Semantic-Native VAE Architecture</text>
  <text x="900" y="82" text-anchor="middle" class="subtitle">Implemented in <tspan font-family="monospace">semantic_vae_native/model.py</tspan> with a trainable semantic stem and semantic head around frozen pretrained VAE cores</text>

  <!-- top notes -->
  <rect x="70" y="110" width="420" height="78" class="box legend"/>
  <text x="95" y="141" class="label">Input configuration</text>
  <text x="95" y="165" class="body">Semantic clip: <tspan font-family="monospace">[B, T, 192, 704]</tspan></text>
  <text x="95" y="184" class="body">Class channels after one-hot: <tspan font-family="monospace">19</tspan>, default clip size: <tspan font-family="monospace">T = 4</tspan></text>

  <rect x="1310" y="110" width="420" height="78" class="box legend"/>
  <text x="1335" y="141" class="label">Implementation note</text>
  <text x="1335" y="165" class="body">Encoder path is 2D and processes frames independently.</text>
  <text x="1335" y="184" class="body">Decoder module is temporal-aware, but your code decodes each latent frame with <tspan font-family="monospace">num_frames = 1</tspan>.</text>

  <!-- legend -->
  <rect x="655" y="108" width="490" height="82" class="box legend"/>
  <text x="680" y="141" class="label">Legend</text>
  <rect x="680" y="154" width="24" height="18" class="box trainable"/>
  <text x="715" y="168" class="body">Trainable custom module</text>
  <rect x="885" y="154" width="24" height="18" class="box frozen"/>
  <text x="920" y="168" class="body">Frozen pretrained VAE core</text>
  <rect x="1090" y="154" width="24" height="18" class="box latent"/>
  <text x="1125" y="168" class="body">Latent representation</text>

  <!-- section headings -->
  <text x="365" y="235" text-anchor="middle" class="section">2D Encoder Branch</text>
  <text x="1435" y="235" text-anchor="middle" class="section">Temporal Decoder Branch</text>

  <!-- left input path -->
  <rect x="90" y="275" width="230" height="94" class="box op"/>
  <text x="205" y="306" text-anchor="middle" class="label">Semantic ID Input</text>
  <text x="205" y="330" text-anchor="middle" class="body">Discrete class IDs</text>
  <text x="205" y="352" text-anchor="middle" class="body"><tspan font-family="monospace">[B, T, 192, 704]</tspan></text>

  <rect x="90" y="415" width="230" height="94" class="box op"/>
  <text x="205" y="446" text-anchor="middle" class="label">One-Hot Encoding</text>
  <text x="205" y="470" text-anchor="middle" class="body">Flatten clip into batch</text>
  <text x="205" y="492" text-anchor="middle" class="body"><tspan font-family="monospace">[B*T, 19, 192, 704]</tspan></text>

  <rect x="90" y="555" width="230" height="166" class="box trainable"/>
  <text x="205" y="587" text-anchor="middle" class="label">Semantic Stem</text>
  <text x="205" y="611" text-anchor="middle" class="body">Trainable 2D front-end</text>
  <rect x="122" y="630" width="166" height="26" class="box op"/>
  <text x="205" y="648" text-anchor="middle" class="small">Conv2d 19 → 64, k=3, p=1</text>
  <rect x="122" y="664" width="78" height="24" class="box op"/>
  <text x="161" y="681" text-anchor="middle" class="small">GroupNorm</text>
  <rect x="210" y="664" width="78" height="24" class="box op"/>
  <text x="249" y="681" text-anchor="middle" class="small">SiLU</text>
  <rect x="122" y="696" width="166" height="26" class="box op"/>
  <text x="205" y="714" text-anchor="middle" class="small">Conv2d 64 → 128, k=3, p=1</text>

  <!-- left encoder U wall -->
  <rect x="430" y="275" width="250" height="96" class="box frozen"/>
  <text x="555" y="307" text-anchor="middle" class="label">Encoder Block E0</text>
  <text x="555" y="331" text-anchor="middle" class="body">Frozen 2D down block</text>
  <text x="555" y="353" text-anchor="middle" class="body"><tspan font-family="monospace">128 ch, 192×704 → 96×352</tspan></text>

  <rect x="430" y="415" width="250" height="96" class="box frozen"/>
  <text x="555" y="447" text-anchor="middle" class="label">Encoder Block E1</text>
  <text x="555" y="471" text-anchor="middle" class="body">Frozen 2D down block</text>
  <text x="555" y="493" text-anchor="middle" class="body"><tspan font-family="monospace">256 ch, 96×352 → 48×176</tspan></text>

  <rect x="430" y="555" width="250" height="96" class="box frozen"/>
  <text x="555" y="587" text-anchor="middle" class="label">Encoder Block E2</text>
  <text x="555" y="611" text-anchor="middle" class="body">Frozen 2D down block</text>
  <text x="555" y="633" text-anchor="middle" class="body"><tspan font-family="monospace">512 ch, 48×176 → 24×88</tspan></text>

  <rect x="430" y="695" width="250" height="96" class="box frozen"/>
  <text x="555" y="727" text-anchor="middle" class="label">Encoder Block E3</text>
  <text x="555" y="751" text-anchor="middle" class="body">Frozen 2D down block</text>
  <text x="555" y="773" text-anchor="middle" class="body"><tspan font-family="monospace">512 ch, 24×88 → 24×88</tspan></text>

  <rect x="430" y="835" width="250" height="108" class="box frozen"/>
  <text x="555" y="867" text-anchor="middle" class="label">Encoder Mid + Output Layers</text>
  <text x="555" y="891" text-anchor="middle" class="body"><tspan font-family="monospace">mid_block → conv_norm_out → conv_act → conv_out</tspan></text>
  <text x="555" y="913" text-anchor="middle" class="body"><tspan font-family="monospace">latent params [B*T, 8, 24, 88]</tspan></text>

  <!-- bottom bottleneck -->
  <rect x="775" y="930" width="250" height="116" class="box latent"/>
  <text x="900" y="965" text-anchor="middle" class="label">Latent Bottleneck</text>
  <text x="900" y="989" text-anchor="middle" class="body">Split into mean and log-variance</text>
  <text x="900" y="1012" text-anchor="middle" class="body">Forward path uses deterministic mean</text>
  <text x="900" y="1035" text-anchor="middle" class="body"><tspan font-family="monospace">z = [B*T, 4, 24, 88]</tspan></text>

  <!-- right decoder U wall -->
  <rect x="1120" y="835" width="250" height="108" class="box frozen"/>
  <text x="1245" y="867" text-anchor="middle" class="label">Decoder Entry</text>
  <text x="1245" y="891" text-anchor="middle" class="body"><tspan font-family="monospace">vae.decode(z_single, num_frames=1)</tspan></text>
  <text x="1245" y="913" text-anchor="middle" class="body">Frozen decoder start, one frame at a time</text>

  <rect x="1120" y="695" width="250" height="96" class="box frozen"/>
  <text x="1245" y="727" text-anchor="middle" class="label">Decoder Block D3</text>
  <text x="1245" y="751" text-anchor="middle" class="body">Frozen temporal up block</text>
  <text x="1245" y="773" text-anchor="middle" class="body"><tspan font-family="monospace">24×88 → higher spatial detail</tspan></text>

  <rect x="1120" y="555" width="250" height="96" class="box frozen"/>
  <text x="1245" y="587" text-anchor="middle" class="label">Decoder Block D2</text>
  <text x="1245" y="611" text-anchor="middle" class="body">Frozen temporal up block</text>
  <text x="1245" y="633" text-anchor="middle" class="body"><tspan font-family="monospace">toward 48×176 and 96×352</tspan></text>

  <rect x="1120" y="415" width="250" height="96" class="box frozen"/>
  <text x="1245" y="447" text-anchor="middle" class="label">Decoder Block D1</text>
  <text x="1245" y="471" text-anchor="middle" class="body">Frozen temporal up block</text>
  <text x="1245" y="493" text-anchor="middle" class="body"><tspan font-family="monospace">restores full feature resolution</tspan></text>

  <rect x="1120" y="275" width="250" height="96" class="box frozen"/>
  <text x="1245" y="307" text-anchor="middle" class="label">Decoder Feature Tensor</text>
  <text x="1245" y="331" text-anchor="middle" class="body">Feature tap at <tspan font-family="monospace">decoder.conv_act</tspan></text>
  <text x="1245" y="353" text-anchor="middle" class="body"><tspan font-family="monospace">[B*T, 128, 192, 704]</tspan></text>

  <!-- right output path -->
  <rect x="1480" y="415" width="240" height="166" class="box trainable"/>
  <text x="1600" y="447" text-anchor="middle" class="label">Semantic Head</text>
  <text x="1600" y="471" text-anchor="middle" class="body">Trainable 3D prediction head</text>
  <rect x="1510" y="490" width="180" height="26" class="box op"/>
  <text x="1600" y="508" text-anchor="middle" class="small">Conv3d 128 → 64, k=3×3×3, p=1</text>
  <rect x="1510" y="524" width="84" height="24" class="box op"/>
  <text x="1552" y="541" text-anchor="middle" class="small">GroupNorm</text>
  <rect x="1606" y="524" width="84" height="24" class="box op"/>
  <text x="1648" y="541" text-anchor="middle" class="small">SiLU</text>
  <rect x="1510" y="556" width="180" height="26" class="box op"/>
  <text x="1600" y="574" text-anchor="middle" class="small">Conv3d 64 → 19, k=1×1×1</text>

  <rect x="1480" y="635" width="240" height="94" class="box op"/>
  <text x="1600" y="666" text-anchor="middle" class="label">Semantic Logits</text>
  <text x="1600" y="690" text-anchor="middle" class="body"><tspan font-family="monospace">[B, T, 19, 192, 704]</tspan></text>
  <text x="1600" y="712" text-anchor="middle" class="body">Prediction over 19 semantic classes</text>

  <rect x="1480" y="783" width="240" height="94" class="box op"/>
  <text x="1600" y="814" text-anchor="middle" class="label">Predicted Semantic IDs</text>
  <text x="1600" y="838" text-anchor="middle" class="body"><tspan font-family="monospace">argmax → [B, T, 192, 704]</tspan></text>
  <text x="1600" y="860" text-anchor="middle" class="body">Final semantic reconstruction</text>

  <!-- flow arrows left -->
  <path d="M 205 369 L 205 415" class="arrow"/>
  <path d="M 205 509 L 205 555" class="arrow"/>
  <path d="M 320 638 L 430 638" class="arrow"/>

  <path d="M 555 371 L 555 415" class="arrow"/>
  <path d="M 555 511 L 555 555" class="arrow"/>
  <path d="M 555 651 L 555 695" class="arrow"/>
  <path d="M 555 791 L 555 835" class="arrow"/>

  <!-- bottom connector -->
  <path d="M 680 889 L 720 889 L 720 988 L 775 988" class="arrow"/>
  <path d="M 1025 988 L 1080 988 L 1080 889 L 1120 889" class="arrow"/>

  <!-- flow arrows right -->
  <path d="M 1245 835 L 1245 791" class="arrow"/>
  <path d="M 1245 695 L 1245 651" class="arrow"/>
  <path d="M 1245 555 L 1245 511" class="arrow"/>
  <path d="M 1245 415 L 1245 371" class="arrow"/>

  <path d="M 1370 323 L 1425 323 L 1425 498 L 1480 498" class="arrow"/>
  <path d="M 1600 581 L 1600 635" class="arrow"/>
  <path d="M 1600 729 L 1600 783" class="arrow"/>

  <!-- right-side reshape note -->
  <rect x="1420" y="284" width="290" height="88" class="box legend"/>
  <text x="1445" y="314" class="label">Clip reconstruction before 3D head</text>
  <text x="1445" y="338" class="body">Decoder features are collected frame-wise and reshaped:</text>
  <text x="1445" y="360" class="body"><tspan font-family="monospace">[B*T, 128, 192, 704] → [B, T, 128, 192, 704]</tspan></text>

  <!-- side labels -->
  <rect x="700" y="300" width="110" height="34" class="box legend"/>
  <text x="755" y="322" text-anchor="middle" class="small">Frozen encoder core</text>

  <rect x="985" y="300" width="110" height="34" class="box legend"/>
  <text x="1040" y="322" text-anchor="middle" class="small">Frozen decoder core</text>

  <!-- guide lines -->
  <line x1="900" y1="235" x2="900" y2="1085" class="guide"/>
  <line x1="390" y1="255" x2="390" y2="960" class="guide"/>
  <line x1="1410" y1="255" x2="1410" y2="960" class="guide"/>

  <!-- caption -->
  <rect x="70" y="1088" width="1660" height="56" class="box legend"/>
  <text x="95" y="1118" class="caption">Figure X. Semantic-Native VAE architecture. The semantic input replaces the original RGB projection and is processed through a modified encoder interface using a trainable semantic stem. The frozen pretrained encoder core produces latent representations that are decoded through a frozen temporal-aware decoder core. Decoder features are reshaped into clip form and semantic logits are predicted through a trainable 3D semantic head.</text>
</svg>
